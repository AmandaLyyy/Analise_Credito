{% extends 'base.html' %}
{% block titulo %}Editar Fornecedor{% endblock %}
{% block conteudo %}
<div class="card-ecil" style="max-width:580px;">
    <div style="font-size:15px;font-weight:600;color:#1a2332;margin-bottom:20px;">
        <i class="bi bi-pencil-fill me-2"></i>Editar Fornecedor
    </div>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Cliente vinculado *</label>
            <select name="cliente_id" class="form-select" required>
                {% for cliente in clientes %}
                <option value="{{ cliente[0] }}" {% if cliente[0]==fornecedor[1] %}selected{% endif %}>
                    {{ cliente[1] }} — {{ cliente[2] }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Nome do Fornecedor *</label>
            <input type="text" name="nome_fornecedor" class="form-control" value="{{ fornecedor[2] }}" required>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ fornecedor[3] }}">
            </div>
            <div class="col mb-3">
                <label class="form-label">Telefone</label>
                <input type="text" name="telefone" class="form-control" value="{{ fornecedor[4] }}">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Nome do Contato</label>
            <input type="text" name="nome_contato" class="form-control" value="{{ fornecedor[5] }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Fornece Referência?</label>
            <select name="fornece_referencia" class="form-select">
                <option {% if fornecedor[6]=='Sim' %}selected{% endif %}>Sim</option>
                <option {% if fornecedor[6]=='Não' %}selected{% endif %}>Não</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Limite de Crédito (R$)</label>
            <input type="number" name="limite_credito" class="form-control" value="{{ fornecedor[7] }}" step="0.01">
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Data Maior Compra</label>
                <input type="date" name="maior_compra_data" class="form-control"
                    value="{{ fornecedor[8].strftime('%Y-%m-%d') if fornecedor[8] else '' }}">
            </div>
            <div class="col mb-3">
                <label class="form-label">Valor (R$)</label>
                <input type="number" name="maior_compra_valor" class="form-control" value="{{ fornecedor[9] }}" step="0.01">
            </div>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Data Última Compra</label>
                <input type="date" name="ultima_compra_data" class="form-control"
                    value="{{ fornecedor[10].strftime('%Y-%m-%d') if fornecedor[10] else '' }}">
            </div>
            <div class="col mb-3">
                <label class="form-label">Valor (R$)</label>
                <input type="number" name="ultima_compra_valor" class="form-control" value="{{ fornecedor[11] }}" step="0.01">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Data de Cadastro no Fornecedor</label>
            <input type="date" name="data_cadastro_fornecedor" class="form-control"
                value="{{ fornecedor[12].strftime('%Y-%m-%d') if fornecedor[12] else '' }}">
        </div>
        <button type="submit" class="btn-salvar">
            <i class="bi bi-check-circle-fill"></i> Salvar Alterações
        </button>
        <a href="/fornecedores" class="btn-cancelar">
            <i class="bi bi-x-circle"></i> Cancelar
        </a>
    </form>
</div>
{% endblock %}
