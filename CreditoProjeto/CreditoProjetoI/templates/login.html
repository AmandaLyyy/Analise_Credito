<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ECIL - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #d0d4d8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .caixa {
            background: #e8eaec;
            padding: 0;
            border-radius: 10px;
            width: 360px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.8);
            overflow: hidden;
        }

        .topo {
            background: linear-gradient(135deg, #1a6fbd, #2d8fe0);
            padding: 22px 30px 18px;
            text-align: center;
            position: relative;
        }
        .topo::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 13px solid #2d8fe0;
        }
        .topo h1 {
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }
        .topo p {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            margin-top: 4px;
        }

        .corpo {
            padding: 40px 30px 30px;
        }

        .campo {
            margin-bottom: 16px;
            position: relative;
        }
        .campo i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #2d8fe0;
            font-size: 16px;
        }
        .campo input {
            width: 100%;
            padding: 11px 12px 11px 38px;
            border: 1px solid #bfc5cc;
            border-radius: 5px;
            font-size: 14px;
            background: #f5f6f7;
            color: #333;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .campo input:focus {
            border-color: #2d8fe0;
            box-shadow: 0 0 0 3px rgba(45,143,224,0.15);
            background: #fff;
        }
        .campo input::placeholder { color: #aaa; }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1a6fbd, #2d8fe0);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; }
        /* ── MOBILE ── */
        @media (max-width: 480px) {
            body { align-items: flex-start; padding-top: 80px; }
            .caixa { width: 92%; margin: 0 auto; }
        }

        .erro {
            background: #fde8e8;
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 5px;
            margin-bottom: 14px;
            font-size: 13px;
            border-left: 3px solid #e74c3c;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="caixa">
        <div class="topo">
            <h1>🐟 ECIL</h1>
            <p>Sistema de Análise de Crédito</p>
        </div>
        <div class="corpo">
            {% if erro %}
            <div class="erro">{{ erro }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="campo">
                    <i class="bi bi-person-fill"></i>
                    <input type="text" name="usuario" required
                           placeholder="Usuário" autofocus>
                </div>
                <div class="campo">
                    <i class="bi bi-lock-fill"></i>
                    <input type="password" name="senha" required
                           placeholder="Senha">
                </div>
                <button type="submit" class="btn-login">ENTRAR</button>
            </form>
        </div>
    </div>
</body>
</html>
